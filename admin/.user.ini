; Limites de upload do PHP — Fase Receita C1.2
;
; Aplicado pelo PHP-FPM/LSAPI a todos os scripts .php desta pasta
; (admin/upload-image.php principalmente).
;
; .user.ini é o mecanismo "moderno" do PHP (≥ 5.3) pra config por
; diretório, e é o que funciona em shared hosting com FastCGI/LSAPI.
; Demora até `user_ini.cache_ttl` segundos (default 300s = 5 min)
; pra ser recarregado.
;
; Se o servidor estiver usando mod_php (Apache module), as diretivas
; equivalentes do .htaccess (com <IfModule mod_phpX>) é que pegam.
;
; O endpoint upload-image.php ainda valida tamanho em PHP e
; redimensiona pra max 1600px de largura.

upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 60
memory_limit = 128M
